components:
  schemas:
    Hospital:
      type: object
      properties:
        code:
          type: string
          description: Hospital code from SIRS
          example: '1113012'
        name:
          type: string
          description: Hospital name
          example: RS Umum Muhammad Ali Kasim
        address:
          type: string
          description: Hospital address
          example: Jalan Pangur
        phone:
          type: string
          nullable: true
          description: Hospital phone number
          example: null
        type:
          type: string
          description: Hospital type
          example: Rumah Sakit Umum
        class:
          type: string
          description: Hospital class (A, B, C, D)
          example: C
        blu_status:
          type: string
          description: BLU status
          example: BLUD
        ownership:
          type: string
          description: Ownership type
          example: Pemkab
        director:
          type: string
          description: Hospital director name
          example: dr. SRI AGUSTI, M.Ked.,Sp.KJ
        facilities:
          type: object
          properties:
            land_area:
              type: string
              description: Land area
              example: 99.652 M2
            building_area:
              type: string
              description: Building area
              example: '-'
            total_beds:
              type: integer
              description: Total number of beds
              example: 126
        beds:
          type: object
          properties:
            class_i:
              type: integer
              description: Number of class I beds
              example: 14
            class_ii:
              type: integer
              description: Number of class II beds
              example: 12
            class_iii:
              type: integer
              description: Number of class III beds
              example: 68
            hcu:
              type: integer
              description: Number of HCU beds
              example: 4
            perinatology:
              type: integer
              description: Number of perinatology beds
              example: 20
            icu_with_ventilator:
              type: integer
              description: Number of ICU beds with ventilator
              example: 8
        services:
          type: object
          properties:
            count:
              type: integer
              description: Number of services
              example: 10
            list:
              type: array
              items:
                type: string
              description: List of services
              example:
                - Pelayanan medik dasar / umum
                - Pelayanan medik gigi mulut
                - Pelayanan KIA/KB
        staff:
          type: object
          properties:
            total:
              type: integer
              description: Total staff count
              example: 56
            general_practitioner:
              type: number
              description: Number of general practitioners
              example: 38.0
            basic_specialist:
              type: number
              description: Number of basic specialists
              example: 11.0
            other_specialist:
              type: number
              description: Number of other specialists
              example: 7.0
        province_code:
          type: string
          description: Province code
          example: '11'
        regency_code:
          type: string
          description: Regency code
          example: '1113'
        scraped_at:
          type: string
          format: date-time
          description: Timestamp when data was scraped
          example: '2026-01-25T14:26:04.857537'
    HospitalListResponse:
      type: object
      properties:
        is_success:
          type: boolean
          description: Indicates if the request was successful
          example: true
        message:
          type: string
          description: Response message
          example: Success
        data:
          type: array
          items:
            $ref: '#/components/schemas/Hospital'
        paging:
          type: object
          properties:
            page:
              type: integer
              description: Current page number
              example: 1
            size:
              type: integer
              description: Page size
              example: 100
            total_item:
              type: integer
              description: Total number of items
              example: 3291
            total_page:
              type: integer
              description: Total number of pages
              example: 33
    HospitalDetailResponse:
      type: object
      properties:
        is_success:
          type: boolean
          description: Indicates if the request was successful
          example: true
        message:
          type: string
          description: Response message
          example: Success
        data:
          $ref: '#/components/schemas/Hospital'
    TypesResponse:
      type: object
      properties:
        is_success:
          type: boolean
          description: Indicates if the request was successful
          example: true
        message:
          type: string
          description: Response message
          example: Success
        data:
          type: object
          properties:
            types:
              type: array
              items:
                type: string
              description: List of hospital types
              example:
                - Rumah Sakit Umum
                - Rumah Sakit Khusus
                - Rumah Sakit Jiwa
                - Rumah Sakit Ibu dan Anak
            count:
              type: integer
              description: Number of types
              example: 4
    ClassesResponse:
      type: object
      properties:
        is_success:
          type: boolean
          description: Indicates if the request was successful
          example: true
        message:
          type: string
          description: Response message
          example: Success
        data:
          type: object
          properties:
            classes:
              type: array
              items:
                type: string
              description: List of hospital classes
              example:
                - A
                - B
                - C
                - D
            count:
              type: integer
              description: Number of classes
              example: 4
    OwnershipResponse:
      type: object
      properties:
        is_success:
          type: boolean
          description: Indicates if the request was successful
          example: true
        message:
          type: string
          description: Response message
          example: Success
        data:
          type: object
          properties:
            ownership:
              type: array
              items:
                type: string
              description: List of ownership types
              example:
                - Pemkab
                - Pemkot
                - Pemprov
                - Swasta
                - TNI/Polri
            count:
              type: integer
              description: Number of ownership types
              example: 5
    BluStatusResponse:
      type: object
      properties:
        is_success:
          type: boolean
          description: Indicates if the request was successful
          example: true
        message:
          type: string
          description: Response message
          example: Success
        data:
          type: object
          properties:
            blu_status:
              type: array
              items:
                type: string
              description: List of BLU statuses
              example:
                - BLUD
                - Non BLUD
            count:
              type: integer
              description: Number of BLU statuses
              example: 2
    ErrorResponse:
      type: object
      properties:
        is_success:
          type: boolean
          description: Indicates if the request was successful
          example: false
        message:
          type: string
          description: Error message
          example: hospital not found
        data:
          type: 'null'
          description: Null for error responses
          example: null
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-co-id
      description: Your API key for authentication
security:
  - ApiKeyAuth: []
